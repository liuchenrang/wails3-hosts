<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景渐变 - 深靛蓝到紫罗兰 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <!-- 顶部玻璃高光 -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形底 - macOS 风格 squircle -->
  <rect width="512" height="512" rx="113" fill="url(#bg)"/>

  <!-- 顶部玻璃高光层 -->
  <rect width="512" height="280" rx="113" fill="url(#shine)"/>

  <!-- hosts 映射符号：三组节点+连线，代表 IP ↔ 域名的核心功能 -->
  <g>
    <!-- 第1组 -->
    <circle cx="148" cy="152" r="28" fill="#FFFFFF"/>
    <line x1="180" y1="152" x2="332" y2="152" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <circle cx="364" cy="152" r="28" fill="#FFFFFF"/>

    <!-- 第2组（中心 - 聚焦放大） -->
    <circle cx="148" cy="256" r="34" fill="#FFFFFF"/>
    <line x1="186" y1="256" x2="326" y2="256" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    <circle cx="364" cy="256" r="34" fill="#FFFFFF"/>

    <!-- 第3组 -->
    <circle cx="148" cy="360" r="28" fill="#FFFFFF"/>
    <line x1="180" y1="360" x2="332" y2="360" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <circle cx="364" cy="360" r="28" fill="#FFFFFF"/>
  </g>
</svg>
