<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 明亮渐变背景 - 蓝绿色系 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- 白色发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="24" y="24" width="464" height="464" rx="104" ry="104" fill="url(#bgGradient)"/>

  <!-- 内部装饰圆 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.2"/>

  <!-- 主内容区域 - 白色圆角矩形 -->
  <rect x="80" y="100" width="352" height="312" rx="24" ry="24" fill="#ffffff" filter="url(#shadow)"/>

  <!-- 顶部标题栏 -->
  <rect x="80" y="100" width="352" height="48" rx="24" ry="24" fill="#f1f5f9"/>
  <rect x="80" y="124" width="352" height="24" fill="#f1f5f9"/>

  <!-- 窗口控制按钮 -->
  <circle cx="112" cy="124" r="10" fill="#ef4444"/>
  <circle cx="144" cy="124" r="10" fill="#f59e0b"/>
  <circle cx="176" cy="124" r="10" fill="#22c55e"/>

  <!-- 标题文字 -->
  <text x="256" y="130" text-anchor="middle" font-family="SF Pro Display, -apple-system, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">hosts</text>

  <!-- 内容区域 - 域名/IP 映射列表 -->
  <g font-family="SF Mono, Monaco, Consolas, monospace" font-size="22">
    <!-- 第一行 -->
    <text x="100" y="195" fill="#0ea5e9" font-weight="600">127.0.0.1</text>
    <text x="260" y="195" fill="#94a3b8">→</text>
    <text x="290" y="195" fill="#1e293b" font-weight="500">localhost</text>

    <!-- 第二行 -->
    <text x="100" y="245" fill="#0ea5e9" font-weight="600">192.168.1.1</text>
    <text x="260" y="245" fill="#94a3b8">→</text>
    <text x="290" y="245" fill="#1e293b" font-weight="500">server.local</text>

    <!-- 第三行 -->
    <text x="100" y="295" fill="#0ea5e9" font-weight="600">0.0.0.0</text>
    <text x="260" y="295" fill="#94a3b8">→</text>
    <text x="290" y="295" fill="#1e293b" font-weight="500">ads.example</text>

    <!-- 第四行（带开关） -->
    <text x="100" y="345" fill="#0ea5e9" font-weight="600">10.0.0.1</text>
    <text x="260" y="345" fill="#94a3b8">→</text>
    <text x="290" y="345" fill="#1e293b" font-weight="500">dev.local</text>
  </g>

  <!-- 开关指示器（右侧） -->
  <g transform="translate(395, 325)">
    <rect x="0" y="0" width="32" height="20" rx="10" fill="#22c55e"/>
    <circle cx="22" cy="10" r="8" fill="#ffffff"/>
  </g>

  <!-- 底部状态栏 -->
  <rect x="80" y="388" width="352" height="24" rx="0" ry="0" fill="#f8fafc"/>
  <rect x="80" y="388" width="352" height="24" rx="0" ry="24" fill="#f8fafc"/>
  <circle cx="100" cy="400" r="5" fill="#22c55e"/>
  <text x="112" y="405" font-family="SF Pro Display, -apple-system, Arial, sans-serif" font-size="11" fill="#64748b">已连接</text>

  <!-- 右下角装饰 - 齿轮图标（表示配置/管理） -->
  <g transform="translate(400, 380)" filter="url(#glow)">
    <circle r="28" fill="#0ea5e9"/>
    <path d="M0 -12 L2 -4 L10 -4 L4 1 L6 10 L0 5 L-6 10 L-4 1 L-10 -4 L-2 -4 Z" fill="#ffffff" transform="rotate(30)"/>
  </g>
</svg>