name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

env:
  APP_NAME: hosts-manager
  GO_VERSION: '1.24'
  NODE_VERSION: '18'

jobs:
  # ==================== macOS Build ====================
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            goarch: arm64
          - arch: amd64
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build application
        run: |
          mkdir -p bin
          if [ "${{ matrix.arch }}" == "amd64" ]; then
            # Cross-compile for Intel on ARM Mac
            go build -tags production -trimpath -ldflags="-w -s" -o bin/${{ env.APP_NAME }} .
          else
            go build -tags production -trimpath -ldflags="-w -s" -o bin/${{ env.APP_NAME }} .
          fi
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CGO_CFLAGS: "-target ${{ matrix.arch == 'amd64' && 'x86_64-apple-macos10.15' || 'arm64-apple-macos10.15' }}"
          CGO_LDFLAGS: "-target ${{ matrix.arch == 'amd64' && 'x86_64-apple-macos10.15' || 'arm64-apple-macos10.15' }}"

      - name: Create .app bundle
        run: |
          mkdir -p bin/${{ env.APP_NAME }}.app/Contents/{MacOS,Resources}
          cp build/darwin/icons.icns bin/${{ env.APP_NAME }}.app/Contents/Resources/ 2>/dev/null || echo "No icons.icns found"
          cp bin/${{ env.APP_NAME }} bin/${{ env.APP_NAME }}.app/Contents/MacOS/
          cp build/darwin/Info.plist bin/${{ env.APP_NAME }}.app/Contents/ 2>/dev/null || echo "No Info.plist found"
          codesign --force --deep --sign - bin/${{ env.APP_NAME }}.app || echo "Codesign skipped"

      - name: Create ZIP archive
        run: |
          cd bin
          zip -r ${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.zip ${{ env.APP_NAME }}.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.zip
          retention-days: 30

  # ==================== Windows Build ====================
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Embed Windows icon and version info
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          goversioninfo -icon=build/windows/icon.ico -manifest=build/windows/wails.exe.manifest -o resource.syso build/windows/info.json
        shell: pwsh

      - name: Build application
        run: |
          New-Item -ItemType Directory -Force -Path bin
          go build -tags production -trimpath -ldflags="-w -s -H windowsgui" -o bin/${{ env.APP_NAME }}.exe .
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        shell: pwsh

      - name: Package with NSIS installer
        run: |
          choco install nsis -y --no-progress
          $version = if ("${{ github.ref_name }}" -match "^v(.+)$") { $matches[1] } else { "1.0.5" }
          $nsisScript = @"
          !define APP_NAME "Hosts Manager"
          !define APP_VERSION "$version"
          !define APP_EXE "hosts-manager.exe"
          !define OUT_FILE "hosts-manager-windows-amd64-setup.exe"
          OutFile "..\$\{OUT_FILE}"
          InstallDir "`$PROGRAMFILES64\Hosts Manager"
          RequestExecutionLevel admin
          Page directory
          Page instfiles
          Section
            SetOutPath `$INSTDIR
            File "hosts-manager.exe"
            CreateShortcut "`$DESKTOP\Hosts Manager.lnk" "`$INSTDIR\hosts-manager.exe"
            CreateDirectory "`$SMPROGRAMS\Hosts Manager"
            CreateShortcut "`$SMPROGRAMS\Hosts Manager\Hosts Manager.lnk" "`$INSTDIR\hosts-manager.exe"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\HostsManager" "DisplayName" "Hosts Manager"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\HostsManager" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\HostsManager" "DisplayVersion" "$version"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\HostsManager" "Publisher" "liuchenrang"
          SectionEnd
          Section "Uninstall"
            Delete "`$INSTDIR\hosts-manager.exe"
            Delete "`$INSTDIR\uninstall.exe"
            Delete "`$DESKTOP\Hosts Manager.lnk"
            Delete "`$SMPROGRAMS\Hosts Manager\Hosts Manager.lnk"
            RMDir "`$SMPROGRAMS\Hosts Manager"
            RMDir "`$INSTDIR"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\HostsManager"
          SectionEnd
          "@
          Set-Content -Path "bin\installer.nsi" -Value $nsisScript -Encoding UTF8
          cd bin
          makensis installer.nsi
        shell: pwsh

      - name: Create ZIP archive
        run: |
          cd bin
          Compress-Archive -Path ${{ env.APP_NAME }}.exe -DestinationPath ${{ env.APP_NAME }}-windows-${{ matrix.arch }}.zip
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-setup
          path: bin/${{ env.APP_NAME }}-windows-${{ matrix.arch }}-setup.exe
          retention-days: 30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: bin/${{ env.APP_NAME }}-windows-${{ matrix.arch }}.zip
          retention-days: 30

  # ==================== Create Release ====================
  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}